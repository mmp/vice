name: Run All Scenarios

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  run-scenarios:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true
        fetch-depth: 0
        lfs: false

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: go.sum

    - name: Install Linux dependencies
      run: |
        sudo apt update
        sudo apt install xorg-dev libsdl2-dev libsystemd-dev

    - name: Build vice
      run: ./build.sh

    - name: Cache videomaps
      id: cache-videomaps
      uses: actions/cache@v5
      with:
        path: resources/videomaps
        key: videomaps-${{ hashFiles('resources/videomaps/**') }}

    - name: Cache wx resources
      id: cache-wx
      uses: actions/cache@v5
      with:
        path: resources/wx
        key: wx-${{ hashFiles('resources/wx/**') }}

    - name: Fetch videomaps from LFS
      if: steps.cache-videomaps.outputs.cache-hit != 'true'
      run: |
        git lfs install
        git lfs pull --include="resources/videomaps/*"

    - name: Fetch wx resources from LFS
      if: steps.cache-wx.outputs.cache-hit != 'true'
      run: |
        git lfs install
        git lfs pull --include="resources/wx/**"

    - name: Check scenarios
      run: ./vice -lint

    - name: Run all scenarios
      run: ./run-all-scenarios.sh ./vice
    
    - name: Upload logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: scenario-logs
        path: |
          scenario-test-*.txt
